<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#74ebd5,#ACB6E5);
margin:0;
text-align:center;
}

.container{
max-width:950px;
margin:20px auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.timer{
font-size:24px;
font-weight:bold;
color:#d9534f;
margin-bottom:10px;
}

.score-board{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:15px;
}

.team{
padding:12px;
background:#f0f0f0;
border-radius:10px;
font-size:18px;
}

.active{
background:#c8f7c5;
font-weight:bold;
}

.question{
  font-size:24px;
  text-align:left;
  margin:10px 0;
  white-space: pre-line;
}

.options{
margin-top:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.optionBtn{
padding:15px;
font-size:20px;
border:none;
border-radius:12px;
cursor:pointer;
color:white;
font-weight:bold;
}

.btnA{background:#1E88E5;}
.btnB{background:#43A047;}
.btnC{background:#FB8C00;}
.btnD{background:#8E24AA;}

.correct{background:#2ecc71!important;}
.wrong{background:#e74c3c!important;}

button{
margin:5px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
font-size:16px;
cursor:pointer;
}

.feedback{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.pembahasan{
display:none;
margin-top:15px;
padding:15px;
background:#f9fbff;
border-left:5px solid #2196F3;
text-align:left;
border-radius:10px;
}
.close{
float:right;
cursor:pointer;
color:red;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h1>🎮 Kuis Matematika</h1>
<h3>Keliling dan Luas Bangun Datar</h3>

<div class="timer" id="timer">Waktu: 60:00</div>

<div class="score-board">
<div id="team1" class="team active"></div>
<div id="team2" class="team"></div>
<div id="team3" class="team"></div>
<div id="team4" class="team"></div>
</div>

<div id="questionNumber"></div>
<div class="question" id="question"></div>
<div class="options" id="options"></div>

<button onclick="nextQuestion()">Soal Berikut</button>
<button onclick="switchTeam()">Ganti Regu</button>
<button onclick="showPembahasan()">📘 Pembahasan</button>

<div id="feedback" class="feedback"></div>

<div id="pembahasan" class="pembahasan">
<span class="close" onclick="closePembahasan()">✖</span>
<b>Pembahasan</b>
<div id="pembahasanText"></div>
</div>
</div>

<script>
let questions=[
{
q:"Sebuah taman berbentuk trapesium memiliki sisi sejajar 12 m dan 8 m, tinggi 5 m, dan dua sisi lainnya masing-masing 6 m dan 7 m. Hitung keliling dan luas taman tersebut.",
options:["Keliling: 33 m, Luas: 50 m²","Keliling: 30 m, Luas: 60 m²","Keliling: 33 m, Luas: 60 m²","Keliling: 30 m, Luas: 50 m²"],
correct:"Keliling: 33 m, Luas: 50 m²",
p:"Keliling trapesium adalah jumlah seluruh sisi: 12 + 8 + 6 + 7 = 33 m. Luas trapesium dihitung dengan rumus ½ × (jumlah sisi sejajar) × tinggi = ½ × (12 + 8) × 5 = 50 m².",
img:""
},

{
q:"Sebuah kolam berbentuk lingkaran memiliki diameter 10 m. Hitung keliling dan luas kolam tersebut (gunakan π ≈ 3,14).",
options:["Keliling: 31,4 m, Luas: 78,5 m²","Keliling: 62,8 m, Luas: 314 m²","Keliling: 31,4 m, Luas: 314 m²","Keliling: 62,8 m, Luas: 78,5 m²"],
correct:"Keliling: 31,4 m, Luas: 78,5 m²",
p:"Diameter 10 m berarti jari-jari 5 m. Keliling lingkaran = π × d = 3,14 × 10 = 31,4 m. Luas lingkaran = π × r² = 3,14 × 5² = 78,5 m².",
img:""
},

{
q:"Sebuah lantai berbentuk persegi panjang memiliki panjang 6 m dan lebar 4 m. Hitung keliling dan luas lantai tersebut.",
options:["Keliling: 20 m, Luas: 24 m²","Keliling: 24 m, Luas: 20 m²","Keliling: 20 m, Luas: 20 m²","Keliling: 24 m, Luas: 24 m²"],
correct:"Keliling: 20 m, Luas: 24 m²",
p:"Keliling persegi panjang dihitung dengan 2 × (panjang + lebar) = 2 × (6 + 4) = 20 m. Luas persegi panjang = panjang × lebar = 6 × 4 = 24 m².",
img:""
},

{
q:"Sebuah papan reklame berbentuk belah ketupat memiliki sisi 5 m, diagonal 1 = 6 m, dan diagonal 2 = 8 m. Hitung keliling dan luasnya.",
options:["Keliling: 20 m, Luas: 48 m²","Keliling: 20 m, Luas: 24 m²","Keliling: 25 m, Luas: 48 m²","Keliling: 25 m, Luas: 24 m²"],
correct:"Keliling: 20 m, Luas: 24 m²",
p:"Keliling belah ketupat = 4 × sisi = 4 × 5 = 20 m. Luas belah ketupat dihitung dengan rumus ½ × diagonal 1 × diagonal 2 = ½ × 6 × 8 = 24 m². Opsi jawaban sebelumnya salah dan telah diperbaiki sesuai konsep yang benar.",
img:""
},

{
q:"Sebuah halaman rumah berbentuk segitiga memiliki alas 10 m, tinggi 6 m, dan dua sisi lainnya masing-masing 7 m dan 9 m. Hitung keliling dan luasnya.",
options:["Keliling: 26 m, Luas: 30 m²","Keliling: 30 m, Luas: 26 m²","Keliling: 26 m, Luas: 60 m²","Keliling: 30 m, Luas: 60 m²"],
correct:"Keliling: 26 m, Luas: 30 m²",
p:"Keliling segitiga adalah jumlah seluruh sisi: 10 + 7 + 9 = 26 m. Luas segitiga = ½ × alas × tinggi = ½ × 10 × 6 = 30 m².",
img:""
}

];

let currentQuestion=0;
let scores=[0,0,0,0];
let wrongs=[0,0,0,0];
let currentTeam=0;
let answered=new Array(questions.length).fill(false);
let quizFinished=false;

function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}}

function showQuestion(){
if(quizFinished) return;

let q=questions[currentQuestion];
let opsi=[...q.options];
shuffle(opsi);

q.correctIndex=opsi.indexOf(q.correct);
q.correctLetter=String.fromCharCode(65+q.correctIndex);

document.getElementById("question").textContent=q.q;
document.getElementById("questionNumber").textContent=
`Soal ${currentQuestion+1} dari ${questions.length}`;

let html="";
opsi.forEach((o,i)=>{
let letter=String.fromCharCode(65+i);
let btnClass=["btnA","btnB","btnC","btnD"][i];
html+=`<button class="optionBtn ${btnClass}"
onclick="checkAnswer('${letter}','${o}',this)">
${letter}. ${o}</button>`;
});
document.getElementById("options").innerHTML=html;
document.getElementById("feedback").textContent="";
closePembahasan();
}

function checkAnswer(letter,text,btn){
if(quizFinished) return;

let q=questions[currentQuestion];
document.querySelectorAll(".optionBtn").forEach(b=>b.disabled=true);

if(text===q.correct){
btn.classList.add("correct");
scores[currentTeam]++;
answered[currentQuestion]=true;
document.getElementById("feedback").textContent="✅ Benar";
}else{
btn.classList.add("wrong");
wrongs[currentTeam]++;
document.getElementById("feedback").textContent="❌ Salah";
}

updateScore();

setTimeout(()=>{
if(answered.every(v=>v)){
endQuiz();
}else nextQuestion();
},800);
}

function nextQuestion(){
let start=currentQuestion;
do{
currentQuestion=(currentQuestion+1)%questions.length;
}while(answered[currentQuestion] && currentQuestion!==start);
showQuestion();
}

function endQuiz(){
quizFinished=true;
clearInterval(timer);
document.getElementById("question").innerHTML="🏁 <b>KUIS SELESAI</b>";
document.getElementById("options").innerHTML="";
document.getElementById("feedback").innerHTML=showWinners();
}

function showWinners(){
let rank=[0,1,2,3].map(i=>({
team:i+1,
score:scores[i]-wrongs[i]
}));
rank.sort((a,b)=>b.score-a.score);

let html="<h2>🏆 Pengumuman Juara</h2>";
rank.forEach((r,i)=>{
html+=`<p>Juara ${i+1}: <b>Regu ${r.team}</b> (Skor ${r.score})</p>`;
});
return html;
}

function updateScore(){
for(let i=0;i<4;i++){
document.getElementById("team"+(i+1)).textContent=
`Regu ${i+1} | Benar: ${scores[i]} | Salah: ${wrongs[i]} | Skor: ${scores[i]-wrongs[i]}`;
}}

function switchTeam(){
document.getElementById("team"+(currentTeam+1)).classList.remove("active");
currentTeam=(currentTeam+1)%4;
document.getElementById("team"+(currentTeam+1)).classList.add("active");
}

function showPembahasan(){
document.getElementById("pembahasanText").textContent=
questions[currentQuestion].p;
document.getElementById("pembahasan").style.display="block";
}

function closePembahasan(){
document.getElementById("pembahasan").style.display="none";
}

let timeLeft=3600;
let timer=setInterval(()=>{
let m=Math.floor(timeLeft/60);
let s=timeLeft%60;
if(s<10)s="0"+s;
document.getElementById("timer").textContent=`Waktu: ${m}:${s}`;
timeLeft--;
if(timeLeft<0){
document.getElementById("timer").textContent="⏰ Waktu Habis";
endQuiz();
}},1000);

shuffle(questions);
updateScore();
showQuestion();
</script>


</body>
</html>
