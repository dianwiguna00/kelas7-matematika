<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#74ebd5,#ACB6E5);
margin:0;
text-align:center;
}

.container{
max-width:950px;
margin:20px auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.timer{
font-size:24px;
font-weight:bold;
color:#d9534f;
margin-bottom:10px;
}

.score-board{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:15px;
}

.team{
padding:12px;
background:#f0f0f0;
border-radius:10px;
font-size:18px;
}

.active{
background:#c8f7c5;
font-weight:bold;
}

.question{
  font-size:24px;
  text-align:left;
  margin:10px 0;
  white-space: pre-line;
}

.options{
margin-top:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.optionBtn{
padding:15px;
font-size:20px;
border:none;
border-radius:12px;
cursor:pointer;
color:white;
font-weight:bold;
}

.btnA{background:#1E88E5;}
.btnB{background:#43A047;}
.btnC{background:#FB8C00;}
.btnD{background:#8E24AA;}

.correct{background:#2ecc71!important;}
.wrong{background:#e74c3c!important;}

button{
margin:5px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
font-size:16px;
cursor:pointer;
}

.feedback{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.pembahasan{
display:none;
margin-top:15px;
padding:15px;
background:#f9fbff;
border-left:5px solid #2196F3;
text-align:left;
border-radius:10px;
}
.close{
float:right;
cursor:pointer;
color:red;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h1>🎮 Kuis Matematika</h1>
<h3>Menyelesaikan Masalah Perbandingan Senilai Menggunakan Tabel dan Grafik</h3>

<div class="timer" id="timer">Waktu: 60:00</div>

<div class="score-board">
<div id="team1" class="team active"></div>
<div id="team2" class="team"></div>
<div id="team3" class="team"></div>
<div id="team4" class="team"></div>
</div>

<div id="questionNumber"></div>
<div class="question" id="question"></div>
<div class="options" id="options"></div>

<button onclick="nextQuestion()">Soal Berikut</button>
<button onclick="switchTeam()">Ganti Regu</button>
<button onclick="showPembahasan()">📘 Pembahasan</button>

<div id="feedback" class="feedback"></div>

<div id="pembahasan" class="pembahasan">
<span class="close" onclick="closePembahasan()">✖</span>
<b>Pembahasan</b>
<div id="pembahasanText"></div>
</div>
</div>

<script>
let questions=[
{
q:"Perhatikan tabel berikut tentang harga minyak goreng.\n Liter | Harga Total (Rp)\n1 | 14.000\n2 | 28.000\n3 | 42.000\n4 | 56.000\n5 | 70.000\n6 | 84.000\n\nBerdasarkan tabel di atas, berapakah harga untuk 5 liter minyak goreng?",
options:["Rp56.000","Rp60.000","Rp70.000","Rp75.000"],
correct:"Rp70.000",
p:"Dari tabel terlihat bahwa harga minyak goreng berbanding senilai dengan jumlah liter. Harga per liter adalah Rp14.000 sehingga harga untuk 5 liter adalah 5 × Rp14.000 = Rp70.000. Kunci jawaban pada soal sebelumnya diperbaiki.",
img:""
},

{
q:"Sebuah mobil menempuh jarak 60 km setiap jam. Berikut tabel jarak tempuh selama beberapa jam:\n\nWaktu (jam) | Jarak (km)\n1 | 60\n2 | 120\n3 | 180\n4 | 240\n5 | 300\n\nJika mobil berjalan selama 4 jam, berapa jarak yang ditempuh?",
options:["120 km","180 km","240 km","300 km"],
correct:"240 km",
p:"Mobil menempuh jarak 60 km setiap jam. Maka dalam 4 jam jarak yang ditempuh adalah 4 × 60 = 240 km.",
img:""
},

{
q:"Perhatikan grafik hubungan antara jumlah buku tulis dan harga total berikut (setiap buku seharga Rp3.500):\n\nJumlah Buku: 1  2  4  6\nHarga Total: 3.500  7.000  14.000  21.000\n\nBerapakah harga untuk 4 buku tulis?",
options:["Rp7.000","Rp10.500","Rp14.000","Rp21.000"],
correct:"Rp14.000",
p:"Harga satu buku adalah Rp3.500. Maka harga untuk 4 buku adalah 4 × Rp3.500 = Rp14.000.",
img:""
},

{
q:"Berikut adalah tabel waktu dan jarak tempuh sepeda:\n\nWaktu (jam) | Jarak (km)\n1 | 25\n2 | 50\n3 | 75\n4 | 100\n\nJika sepeda berjalan selama 3 jam, berapa jarak yang ditempuh?",
options:["50 km","60 km","75 km","100 km"],
correct:"75 km",
p:"Berdasarkan tabel, sepeda menempuh jarak 25 km setiap jam. Dalam 3 jam jarak yang ditempuh adalah 3 × 25 = 75 km.",
img:""
},

{
q:"Berdasarkan grafik garis lurus yang melalui titik (0,0) dan (5,50), hubungan antara waktu (jam) dan jarak (km) adalah...",
options:["Setiap jam bertambah 5 km","Setiap jam bertambah 10 km","Setiap jam bertambah 50 km","Setiap jam bertambah 25 km"],
correct:"Setiap jam bertambah 10 km",
p:"Grafik melalui titik (0,0) dan (5,50) menunjukkan jarak 50 km ditempuh dalam 5 jam. Gradien grafik adalah 50 ÷ 5 = 10 km per jam. Jadi setiap jam jarak bertambah 10 km. Kunci jawaban dikoreksi sesuai konsep gradien grafik.",
img:""
}

];

let currentQuestion=0;
let scores=[0,0,0,0];
let wrongs=[0,0,0,0];
let currentTeam=0;
let answered=new Array(questions.length).fill(false);
let quizFinished=false;

function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}}

function showQuestion(){
if(quizFinished) return;

let q=questions[currentQuestion];
let opsi=[...q.options];
shuffle(opsi);

q.correctIndex=opsi.indexOf(q.correct);
q.correctLetter=String.fromCharCode(65+q.correctIndex);

document.getElementById("question").textContent=q.q;
document.getElementById("questionNumber").textContent=
`Soal ${currentQuestion+1} dari ${questions.length}`;

let html="";
opsi.forEach((o,i)=>{
let letter=String.fromCharCode(65+i);
let btnClass=["btnA","btnB","btnC","btnD"][i];
html+=`<button class="optionBtn ${btnClass}"
onclick="checkAnswer('${letter}','${o}',this)">
${letter}. ${o}</button>`;
});
document.getElementById("options").innerHTML=html;
document.getElementById("feedback").textContent="";
closePembahasan();
}

function checkAnswer(letter,text,btn){
if(quizFinished) return;

let q=questions[currentQuestion];
document.querySelectorAll(".optionBtn").forEach(b=>b.disabled=true);

if(text===q.correct){
btn.classList.add("correct");
scores[currentTeam]++;
answered[currentQuestion]=true;
document.getElementById("feedback").textContent="✅ Benar";
}else{
btn.classList.add("wrong");
wrongs[currentTeam]++;
document.getElementById("feedback").textContent="❌ Salah";
}

updateScore();

setTimeout(()=>{
if(answered.every(v=>v)){
endQuiz();
}else nextQuestion();
},800);
}

function nextQuestion(){
let start=currentQuestion;
do{
currentQuestion=(currentQuestion+1)%questions.length;
}while(answered[currentQuestion] && currentQuestion!==start);
showQuestion();
}

function endQuiz(){
quizFinished=true;
clearInterval(timer);
document.getElementById("question").innerHTML="🏁 <b>KUIS SELESAI</b>";
document.getElementById("options").innerHTML="";
document.getElementById("feedback").innerHTML=showWinners();
}

function showWinners(){
let rank=[0,1,2,3].map(i=>({
team:i+1,
score:scores[i]-wrongs[i]
}));
rank.sort((a,b)=>b.score-a.score);

let html="<h2>🏆 Pengumuman Juara</h2>";
rank.forEach((r,i)=>{
html+=`<p>Juara ${i+1}: <b>Regu ${r.team}</b> (Skor ${r.score})</p>`;
});
return html;
}

function updateScore(){
for(let i=0;i<4;i++){
document.getElementById("team"+(i+1)).textContent=
`Regu ${i+1} | Benar: ${scores[i]} | Salah: ${wrongs[i]} | Skor: ${scores[i]-wrongs[i]}`;
}}

function switchTeam(){
document.getElementById("team"+(currentTeam+1)).classList.remove("active");
currentTeam=(currentTeam+1)%4;
document.getElementById("team"+(currentTeam+1)).classList.add("active");
}

function showPembahasan(){
document.getElementById("pembahasanText").textContent=
questions[currentQuestion].p;
document.getElementById("pembahasan").style.display="block";
}

function closePembahasan(){
document.getElementById("pembahasan").style.display="none";
}

let timeLeft=3600;
let timer=setInterval(()=>{
let m=Math.floor(timeLeft/60);
let s=timeLeft%60;
if(s<10)s="0"+s;
document.getElementById("timer").textContent=`Waktu: ${m}:${s}`;
timeLeft--;
if(timeLeft<0){
document.getElementById("timer").textContent="⏰ Waktu Habis";
endQuiz();
}},1000);

shuffle(questions);
updateScore();
showQuestion();
</script>


</body>
</html>
