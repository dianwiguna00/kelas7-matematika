<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#74ebd5,#ACB6E5);
margin:0;
text-align:center;
}

.container{
max-width:950px;
margin:20px auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.timer{
font-size:24px;
font-weight:bold;
color:#d9534f;
margin-bottom:10px;
}

.score-board{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:15px;
}

.team{
padding:12px;
background:#f0f0f0;
border-radius:10px;
font-size:18px;
}

.active{
background:#c8f7c5;
font-weight:bold;
}

.question{
  font-size:24px;
  text-align:left;
  margin:10px 0;
  white-space: pre-line;
}

.options{
margin-top:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.optionBtn{
padding:15px;
font-size:20px;
border:none;
border-radius:12px;
cursor:pointer;
color:white;
font-weight:bold;
}

.btnA{background:#1E88E5;}
.btnB{background:#43A047;}
.btnC{background:#FB8C00;}
.btnD{background:#8E24AA;}

.correct{background:#2ecc71!important;}
.wrong{background:#e74c3c!important;}

button{
margin:5px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
font-size:16px;
cursor:pointer;
}

.feedback{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.pembahasan{
display:none;
margin-top:15px;
padding:15px;
background:#f9fbff;
border-left:5px solid #2196F3;
text-align:left;
border-radius:10px;
}
.close{
float:right;
cursor:pointer;
color:red;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h1>🎮 Kuis Matematika</h1>
<h3>Menafsirkan Solusi dari Persamaan dan Pertidaksamaan dalam Konteks Kehidupan Nyata</h3>

<div class="timer" id="timer">Waktu: 60:00</div>

<div class="score-board">
<div id="team1" class="team active"></div>
<div id="team2" class="team"></div>
<div id="team3" class="team"></div>
<div id="team4" class="team"></div>
</div>

<div id="questionNumber"></div>
<div class="question" id="question"></div>
<div class="options" id="options"></div>

<button onclick="nextQuestion()">Soal Berikut</button>
<button onclick="switchTeam()">Ganti Regu</button>
<button onclick="showPembahasan()">📘 Pembahasan</button>

<div id="feedback" class="feedback"></div>

<div id="pembahasan" class="pembahasan">
<span class="close" onclick="closePembahasan()">✖</span>
<b>Pembahasan</b>
<div id="pembahasanText"></div>
</div>
</div>

<script>
let questions=[
{
q:"Seorang siswa membeli 4 buku dengan harga masing-masing x rupiah. Total belanja adalah Rp80.000. Apa makna dari solusi x = 20.000?\n",
options:["Harga total semua buku adalah Rp20.000","Harga satu buku adalah Rp20.000","Siswa membeli 20.000 buku","Siswa membayar Rp20.000 untuk ongkir"],
correct:"Harga satu buku adalah Rp20.000",
p:"Dari persamaan 4x = 80.000 diperoleh x = 20.000. Nilai x menyatakan harga satu buku, sehingga maknanya adalah harga satu buku Rp20.000.",
img:""
},
{
q:"Seorang siswa memiliki uang x rupiah dan ingin membeli tas seharga Rp150.000. Jika x ≥ 150.000, apa makna dari pertidaksamaan tersebut?\n",
options:["Siswa harus memiliki uang kurang dari Rp150.000","Siswa tidak bisa membeli tas","Siswa harus memiliki minimal Rp150.000","Harga tas bisa berubah"],
correct:"Siswa harus memiliki minimal Rp150.000",
p:"Pertidaksamaan x ≥ 150.000 berarti jumlah uang siswa sama dengan atau lebih dari Rp150.000 agar dapat membeli tas.",
img:""
},
{
q:"Harga satu tiket bioskop adalah Rp25.000. Seorang siswa ingin membeli x tiket dengan uang tidak lebih dari Rp100.000. Apa makna dari solusi x ≤ 4?\n",
options:["Siswa bisa membeli lebih dari 4 tiket","Siswa hanya bisa membeli maksimal 4 tiket","Harga tiket adalah Rp100.000","Siswa tidak bisa membeli tiket"],
correct:"Siswa hanya bisa membeli maksimal 4 tiket",
p:"Dari pertidaksamaan 25.000x ≤ 100.000 diperoleh x ≤ 4, yang berarti siswa paling banyak dapat membeli 4 tiket.",
img:""
},
{
q:"Seorang anak menabung x rupiah setiap minggu. Dalam 4 minggu, ia ingin memiliki minimal Rp80.000. Apa makna dari pertidaksamaan 4x ≥ 80.000?\n",
options:["Anak harus menabung kurang dari Rp20.000 per minggu","Anak harus menabung minimal Rp20.000 per minggu","Anak menabung Rp80.000 setiap minggu","Anak tidak bisa menabung"],
correct:"Anak harus menabung minimal Rp20.000 per minggu",
p:"Pertidaksamaan 4x ≥ 80.000 dapat disederhanakan menjadi x ≥ 20.000. Artinya, jumlah tabungan setiap minggu harus minimal Rp20.000.",
img:""
},
{
q:"Seorang ibu membeli 5 kg beras dengan harga x rupiah per kg. Total pembayaran Rp65.000. Apa makna dari solusi x = 13.000?\n",
options:["Harga total beras adalah Rp13.000","Ibu membeli 13 kg beras","Harga satu kg beras adalah Rp13.000","Ibu membayar Rp13.000 untuk ongkir"],
correct:"Harga satu kg beras adalah Rp13.000",
p:"Dari persamaan 5x = 65.000 diperoleh x = 13.000. Nilai x menyatakan harga per kilogram beras, jadi harga satu kg beras Rp13.000.",
img:""
}

];

let currentQuestion=0;
let scores=[0,0,0,0];
let wrongs=[0,0,0,0];
let currentTeam=0;
let answered=new Array(questions.length).fill(false);
let quizFinished=false;

function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}}

function showQuestion(){
if(quizFinished) return;

let q=questions[currentQuestion];
let opsi=[...q.options];
shuffle(opsi);

q.correctIndex=opsi.indexOf(q.correct);
q.correctLetter=String.fromCharCode(65+q.correctIndex);

document.getElementById("question").textContent=q.q;
document.getElementById("questionNumber").textContent=
`Soal ${currentQuestion+1} dari ${questions.length}`;

let html="";
opsi.forEach((o,i)=>{
let letter=String.fromCharCode(65+i);
let btnClass=["btnA","btnB","btnC","btnD"][i];
html+=`<button class="optionBtn ${btnClass}"
onclick="checkAnswer('${letter}','${o}',this)">
${letter}. ${o}</button>`;
});
document.getElementById("options").innerHTML=html;
document.getElementById("feedback").textContent="";
closePembahasan();
}

function checkAnswer(letter,text,btn){
if(quizFinished) return;

let q=questions[currentQuestion];
document.querySelectorAll(".optionBtn").forEach(b=>b.disabled=true);

if(text===q.correct){
btn.classList.add("correct");
scores[currentTeam]++;
answered[currentQuestion]=true;
document.getElementById("feedback").textContent="✅ Benar";
}else{
btn.classList.add("wrong");
wrongs[currentTeam]++;
document.getElementById("feedback").textContent="❌ Salah";
}

updateScore();

setTimeout(()=>{
if(answered.every(v=>v)){
endQuiz();
}else nextQuestion();
},800);
}

function nextQuestion(){
let start=currentQuestion;
do{
currentQuestion=(currentQuestion+1)%questions.length;
}while(answered[currentQuestion] && currentQuestion!==start);
showQuestion();
}

function endQuiz(){
quizFinished=true;
clearInterval(timer);
document.getElementById("question").innerHTML="🏁 <b>KUIS SELESAI</b>";
document.getElementById("options").innerHTML="";
document.getElementById("feedback").innerHTML=showWinners();
}

function showWinners(){
let rank=[0,1,2,3].map(i=>({
team:i+1,
score:scores[i]-wrongs[i]
}));
rank.sort((a,b)=>b.score-a.score);

let html="<h2>🏆 Pengumuman Juara</h2>";
rank.forEach((r,i)=>{
html+=`<p>Juara ${i+1}: <b>Regu ${r.team}</b> (Skor ${r.score})</p>`;
});
return html;
}

function updateScore(){
for(let i=0;i<4;i++){
document.getElementById("team"+(i+1)).textContent=
`Regu ${i+1} | Benar: ${scores[i]} | Salah: ${wrongs[i]} | Skor: ${scores[i]-wrongs[i]}`;
}}

function switchTeam(){
document.getElementById("team"+(currentTeam+1)).classList.remove("active");
currentTeam=(currentTeam+1)%4;
document.getElementById("team"+(currentTeam+1)).classList.add("active");
}

function showPembahasan(){
document.getElementById("pembahasanText").textContent=
questions[currentQuestion].p;
document.getElementById("pembahasan").style.display="block";
}

function closePembahasan(){
document.getElementById("pembahasan").style.display="none";
}

let timeLeft=3600;
let timer=setInterval(()=>{
let m=Math.floor(timeLeft/60);
let s=timeLeft%60;
if(s<10)s="0"+s;
document.getElementById("timer").textContent=`Waktu: ${m}:${s}`;
timeLeft--;
if(timeLeft<0){
document.getElementById("timer").textContent="⏰ Waktu Habis";
endQuiz();
}},1000);

shuffle(questions);
updateScore();
showQuestion();
</script>


</body>
</html>
