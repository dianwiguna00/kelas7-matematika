<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#74ebd5,#ACB6E5);
margin:0;
text-align:center;
}

.container{
max-width:950px;
margin:20px auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.timer{
font-size:24px;
font-weight:bold;
color:#d9534f;
margin-bottom:10px;
}

.score-board{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:15px;
}

.team{
padding:12px;
background:#f0f0f0;
border-radius:10px;
font-size:18px;
}

.active{
background:#c8f7c5;
font-weight:bold;
}

.question{
  font-size:24px;
  text-align:left;
  margin:10px 0;
  white-space: pre-line;
}

.options{
margin-top:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.optionBtn{
padding:15px;
font-size:20px;
border:none;
border-radius:12px;
cursor:pointer;
color:white;
font-weight:bold;
}

.btnA{background:#1E88E5;}
.btnB{background:#43A047;}
.btnC{background:#FB8C00;}
.btnD{background:#8E24AA;}

.correct{background:#2ecc71!important;}
.wrong{background:#e74c3c!important;}

button{
margin:5px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
font-size:16px;
cursor:pointer;
}

.feedback{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.pembahasan{
display:none;
margin-top:15px;
padding:15px;
background:#f9fbff;
border-left:5px solid #2196F3;
text-align:left;
border-radius:10px;
}
.close{
float:right;
cursor:pointer;
color:red;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h1>🎮 Kuis Matematika</h1>
<h3>Menyelesaikan Masalah Kontekstual Menggunakan Bentuk Aljabar</h3>

<div class="timer" id="timer">Waktu: 60:00</div>

<div class="score-board">
<div id="team1" class="team active"></div>
<div id="team2" class="team"></div>
<div id="team3" class="team"></div>
<div id="team4" class="team"></div>
</div>

<div id="questionNumber"></div>
<div class="question" id="question"></div>
<div class="options" id="options"></div>

<button onclick="nextQuestion()">Soal Berikut</button>
<button onclick="switchTeam()">Ganti Regu</button>
<button onclick="showPembahasan()">📘 Pembahasan</button>

<div id="feedback" class="feedback"></div>

<div id="pembahasan" class="pembahasan">
<span class="close" onclick="closePembahasan()">✖</span>
<b>Pembahasan</b>
<div id="pembahasanText"></div>
</div>
</div>

<script>
let questions=[
{
q:"Seorang siswa membeli x buku seharga Rp10.000 per buku dan 2 pensil seharga Rp2.000 per pensil. Bentuk aljabar total biaya belanja adalah ...\n",
options:["10.000x + 2.000","10.000x + 4.000","x + 2.000","12.000x"],
correct:"10.000x + 4.000",
p:"Total biaya diperoleh dengan menjumlahkan biaya buku dan pensil. Biaya buku adalah 10.000x dan biaya pensil adalah 2 × 2.000 = 4.000, sehingga totalnya 10.000x + 4.000.",
img:""
},
{
q:"Seorang ibu memiliki y liter minyak. Ia menggunakan 3 liter untuk memasak dan membeli lagi 2 liter. Bentuk aljabar jumlah minyak sekarang adalah ...\n",
options:["y + 5","y - 1","y - 3","y + 2"],
correct:"y - 1",
p:"Minyak awal sebanyak y liter, kemudian digunakan 3 liter sehingga tersisa y - 3, lalu membeli lagi 2 liter. Jumlah minyak sekarang adalah y - 3 + 2 = y - 1.",
img:""
},
{
q:"Harga satu kaos adalah k rupiah. Jika membeli 4 kaos dan membayar ongkir Rp15.000, bentuk aljabar total biaya adalah ...\n",
options:["4k + 15.000","k + 15.000","15.000k + 4","4 + 15.000k"],
correct:"4k + 15.000",
p:"Biaya pembelian kaos adalah 4 × k = 4k dan ditambah biaya ongkir sebesar 15.000. Jadi total biaya adalah 4k + 15.000.",
img:""
},
{
q:"Seorang siswa belajar x jam setiap hari selama 5 hari. Bentuk aljabar total jam belajar adalah ...\n",
options:["x + 5","5x","x - 5","x ÷ 5"],
correct:"5x",
p:"Total jam belajar diperoleh dengan mengalikan lama belajar per hari dengan jumlah hari, yaitu x × 5 = 5x.",
img:""
},
{
q:"Seorang petani memiliki a hektar lahan. Ia menyewakan 1/3 dari lahannya. Bentuk aljabar luas lahan yang disewakan adalah ...\n",
options:["a ÷ 3","1/3a","a - 1/3","a + 1/3"],
correct:"1/3a",
p:"Luas lahan yang disewakan adalah 1/3 dari seluruh lahan. Dengan demikian, luas lahan yang disewakan dinyatakan sebagai 1/3 × a = 1/3a.",
img:""
}

];

let currentQuestion=0;
let scores=[0,0,0,0];
let wrongs=[0,0,0,0];
let currentTeam=0;
let answered=new Array(questions.length).fill(false);
let quizFinished=false;

function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}}

function showQuestion(){
if(quizFinished) return;

let q=questions[currentQuestion];
let opsi=[...q.options];
shuffle(opsi);

q.correctIndex=opsi.indexOf(q.correct);
q.correctLetter=String.fromCharCode(65+q.correctIndex);

document.getElementById("question").textContent=q.q;
document.getElementById("questionNumber").textContent=
`Soal ${currentQuestion+1} dari ${questions.length}`;

let html="";
opsi.forEach((o,i)=>{
let letter=String.fromCharCode(65+i);
let btnClass=["btnA","btnB","btnC","btnD"][i];
html+=`<button class="optionBtn ${btnClass}"
onclick="checkAnswer('${letter}','${o}',this)">
${letter}. ${o}</button>`;
});
document.getElementById("options").innerHTML=html;
document.getElementById("feedback").textContent="";
closePembahasan();
}

function checkAnswer(letter,text,btn){
if(quizFinished) return;

let q=questions[currentQuestion];
document.querySelectorAll(".optionBtn").forEach(b=>b.disabled=true);

if(text===q.correct){
btn.classList.add("correct");
scores[currentTeam]++;
answered[currentQuestion]=true;
document.getElementById("feedback").textContent="✅ Benar";
}else{
btn.classList.add("wrong");
wrongs[currentTeam]++;
document.getElementById("feedback").textContent="❌ Salah";
}

updateScore();

setTimeout(()=>{
if(answered.every(v=>v)){
endQuiz();
}else nextQuestion();
},800);
}

function nextQuestion(){
let start=currentQuestion;
do{
currentQuestion=(currentQuestion+1)%questions.length;
}while(answered[currentQuestion] && currentQuestion!==start);
showQuestion();
}

function endQuiz(){
quizFinished=true;
clearInterval(timer);
document.getElementById("question").innerHTML="🏁 <b>KUIS SELESAI</b>";
document.getElementById("options").innerHTML="";
document.getElementById("feedback").innerHTML=showWinners();
}

function showWinners(){
let rank=[0,1,2,3].map(i=>({
team:i+1,
score:scores[i]-wrongs[i]
}));
rank.sort((a,b)=>b.score-a.score);

let html="<h2>🏆 Pengumuman Juara</h2>";
rank.forEach((r,i)=>{
html+=`<p>Juara ${i+1}: <b>Regu ${r.team}</b> (Skor ${r.score})</p>`;
});
return html;
}

function updateScore(){
for(let i=0;i<4;i++){
document.getElementById("team"+(i+1)).textContent=
`Regu ${i+1} | Benar: ${scores[i]} | Salah: ${wrongs[i]} | Skor: ${scores[i]-wrongs[i]}`;
}}

function switchTeam(){
document.getElementById("team"+(currentTeam+1)).classList.remove("active");
currentTeam=(currentTeam+1)%4;
document.getElementById("team"+(currentTeam+1)).classList.add("active");
}

function showPembahasan(){
document.getElementById("pembahasanText").textContent=
questions[currentQuestion].p;
document.getElementById("pembahasan").style.display="block";
}

function closePembahasan(){
document.getElementById("pembahasan").style.display="none";
}

let timeLeft=3600;
let timer=setInterval(()=>{
let m=Math.floor(timeLeft/60);
let s=timeLeft%60;
if(s<10)s="0"+s;
document.getElementById("timer").textContent=`Waktu: ${m}:${s}`;
timeLeft--;
if(timeLeft<0){
document.getElementById("timer").textContent="⏰ Waktu Habis";
endQuiz();
}},1000);

shuffle(questions);
updateScore();
showQuestion();
</script>


</body>
</html>
